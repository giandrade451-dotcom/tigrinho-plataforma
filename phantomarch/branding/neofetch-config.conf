# FexOS — Neofetch Custom Config
# Replaces Arch Linux branding with FexOS

print_info() {
    info title
    info underline

    info "OS" distro
    info "Host" model
    info "Kernel" kernel
    info "Uptime" uptime
    info "Packages" packages
    info "Shell" shell
    info "DE" de
    info "WM" wm
    info "Theme" theme
    info "Icons" icons
    info "Terminal" term
    info "CPU" cpu
    info "GPU" gpu
    info "Memory" memory
    info "Disk" disk
    info "Battery" battery

    info cols
}

# Custom ASCII
ascii_distro="FexOS"

# Colors
colors=(5 5 6 5 5 7)

# Custom ASCII art
read -rd '' ascii_data << 'EOF'
${c1}    ╔═══════════════╗
${c1}    ║ ${c2}  ⚡ FexOS  ${c1}  ║
${c1}    ╠═══════════════╣
${c1}    ║${c5} ░░░░░░░░░░░░░ ${c1}║
${c1}    ║${c5} ░${c2}  PHANTOM  ${c5}░ ${c1}║
${c1}    ║${c5} ░░░░░░░░░░░░░ ${c1}║
${c1}    ║${c6}  Performance  ${c1}║
