<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="50%" style="stop-color:#0f0a20"/>
      <stop offset="100%" style="stop-color:#080818"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="40%">
      <stop offset="0%" style="stop-color:#1a0a3a;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#0a0a1a;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(10,10,18,0.92)"/>
      <stop offset="100%" style="stop-color:rgba(10,10,18,0.96)"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#bd93f9"/>
      <stop offset="100%" style="stop-color:#00fff7"/>
    </linearGradient>
  </defs>
  
  <!-- Desktop background -->
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#glow)"/>
  
  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="0" y2="1080" stroke="#fff" stroke-width="1"/>
    <line x1="96" y1="0" x2="96" y2="1080" stroke="#fff" stroke-width="1"/>
    <line x1="192" y1="0" x2="192" y2="1080" stroke="#fff" stroke-width="1"/>
    <line x1="288" y1="0" x2="288" y2="1080" stroke="#fff" stroke-width="1"/>
    <line x1="384" y1="0" x2="384" y2="1080" stroke="#fff" stroke-width="1"/>
  </g>
  
  <!-- FexOS logo center watermark -->
  <text x="960" y="500" text-anchor="middle" fill="rgba(189,147,249,0.08)" font-family="Inter, sans-serif" font-size="120" font-weight="900">FexOS</text>
  
  <!-- Bottom taskbar -->
  <rect x="8" y="1024" width="1904" height="48" rx="14" fill="url(#bar)" stroke="rgba(189,147,249,0.15)" stroke-width="1"/>
  
  <!-- Start button -->
  <rect x="20" y="1032" width="44" height="32" rx="8" fill="rgba(189,147,249,0.2)" stroke="rgba(189,147,249,0.3)" stroke-width="1"/>
  <text x="42" y="1053" text-anchor="middle" fill="#bd93f9" font-family="Inter, sans-serif" font-size="16">⚡</text>
  
  <!-- Workspace indicators -->
  <circle cx="90" cy="1048" r="4" fill="#bd93f9"/>
  <circle cx="106" cy="1048" r="4" fill="#3a3a5e"/>
  <circle cx="122" cy="1048" r="4" fill="#3a3a5e"/>
  <circle cx="138" cy="1048" r="4" fill="#3a3a5e"/>
  
  <!-- Open apps in taskbar -->
  <rect x="170" y="1034" width="36" height="28" rx="6" fill="rgba(255,255,255,0.05)" stroke="transparent"/>
  <text x="188" y="1053" text-anchor="middle" fill="#e0e0e0" font-size="14">🌐</text>
  <rect x="170" y="1062" width="36" height="2" rx="1" fill="#bd93f9"/>
  
  <rect x="212" y="1034" width="36" height="28" rx="6" fill="rgba(255,255,255,0.05)"/>
  <text x="230" y="1053" text-anchor="middle" fill="#e0e0e0" font-size="14">💻</text>
  
  <rect x="254" y="1034" width="36" height="28" rx="6" fill="rgba(255,255,255,0.05)"/>
  <text x="272" y="1053" text-anchor="middle" fill="#e0e0e0" font-size="14">⛏️</text>
  
  <!-- Right side system tray -->
  <text x="1600" y="1053" text-anchor="middle" fill="#50fa7b" font-family="Inter, sans-serif" font-size="11">💻 12%</text>
  <text x="1660" y="1053" text-anchor="middle" fill="#ff79c6" font-family="Inter, sans-serif" font-size="11">🧠 34%</text>
  <text x="1720" y="1053" text-anchor="middle" fill="#f1fa8c" font-family="Inter, sans-serif" font-size="11">🎮 8%</text>
  <text x="1770" y="1053" text-anchor="middle" fill="#00fff7" font-family="Inter, sans-serif" font-size="11">📶 92%</text>
  <text x="1830" y="1053" text-anchor="middle" fill="#bd93f9" font-family="Inter, sans-serif" font-size="11">🔊 75%</text>
  <text x="1880" y="1053" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="12" font-weight="600">14:32</text>
  
  <!-- Notification popup example (top right) -->
  <rect x="1520" y="20" width="380" height="80" rx="12" fill="rgba(15,15,26,0.95)" stroke="rgba(189,147,249,0.2)" stroke-width="1"/>
  <text x="1540" y="48" fill="#bd93f9" font-family="Inter, sans-serif" font-size="13" font-weight="600">🛡️ FexOS Security</text>
  <text x="1540" y="72" fill="#8b8da3" font-family="Inter, sans-serif" font-size="12">Sistema protegido — Nenhuma ameaça</text>
</svg>
