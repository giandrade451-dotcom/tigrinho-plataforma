<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a12"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <linearGradient id="btn" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#bd93f9"/>
      <stop offset="100%" style="stop-color:#00fff7"/>
    </linearGradient>
  </defs>
  
  <!-- App background -->
  <rect width="1920" height="1080" fill="url(#bg)"/>
  
  <!-- Window chrome -->
  <rect x="200" y="100" width="1520" height="880" rx="16" fill="#0f0f1a" stroke="#1e1e35" stroke-width="1"/>
  
  <!-- Title bar -->
  <rect x="200" y="100" width="1520" height="50" rx="16" fill="#0a0a12"/>
  <rect x="200" y="130" width="1520" height="20" fill="#0a0a12"/>
  <text x="240" y="132" fill="#bd93f9" font-family="Inter, sans-serif" font-size="16" font-weight="800">⚡ FexLauncher</text>
  
  <!-- Tabs -->
  <rect x="200" y="150" width="1520" height="44" fill="#12121f"/>
  <text x="260" y="178" fill="#bd93f9" font-family="Inter, sans-serif" font-size="13" font-weight="500">⚡ Jogar</text>
  <rect x="230" y="190" width="80" height="2" fill="#bd93f9"/>
  <text x="380" y="178" fill="#8b8da3" font-family="Inter, sans-serif" font-size="13">📦 Versões</text>
  <text x="500" y="178" fill="#8b8da3" font-family="Inter, sans-serif" font-size="13">👤 Contas</text>
  <text x="620" y="178" fill="#8b8da3" font-family="Inter, sans-serif" font-size="13">🔧 Mods</text>
  <text x="730" y="178" fill="#8b8da3" font-family="Inter, sans-serif" font-size="13">🎨 Skins</text>
  <text x="840" y="178" fill="#8b8da3" font-family="Inter, sans-serif" font-size="13">⚙ Config</text>
  
  <!-- Content area -->
  <text x="280" y="260" fill="#ffffff" font-family="Inter, sans-serif" font-size="24" font-weight="800">Pronto para jogar</text>
  <text x="280" y="290" fill="#6b6d80" font-family="Inter, sans-serif" font-size="13">Selecione uma versão e clique em Jogar</text>
  
  <!-- Version selector -->
  <text x="280" y="350" fill="#e0e0e0" font-family="Inter, sans-serif" font-size="13" font-weight="600">Versão:</text>
  <rect x="340" y="330" width="200" height="36" rx="8" fill="#1a1a2e" stroke="#2a2a3e" stroke-width="1"/>
  <text x="360" y="354" fill="#e0e0e0" font-family="Inter, sans-serif" font-size="13">1.21.4</text>
  
  <!-- Play button (big) -->
  <rect x="280" y="420" width="1400" height="60" rx="14" fill="url(#btn)"/>
  <text x="960" y="458" text-anchor="middle" fill="#0a0a12" font-family="Inter, sans-serif" font-size="20" font-weight="800">⚡  JOGAR</text>
  
  <!-- Account info -->
  <text x="280" y="540" fill="#8b8da3" font-family="Inter, sans-serif" font-size="12">Conta: phantom (offline)</text>
  
  <!-- Recent versions list -->
  <rect x="280" y="580" width="1400" height="50" rx="8" fill="#1a1a2e" stroke="#2a2a3e" stroke-width="1"/>
  <text x="310" y="610" fill="#e0e0e0" font-family="Inter, sans-serif" font-size="13">[release] 1.21.4 — Última versão</text>
  
  <rect x="280" y="640" width="1400" height="50" rx="8" fill="#1a1a2e" stroke="transparent"/>
  <text x="310" y="670" fill="#8b8da3" font-family="Inter, sans-serif" font-size="13">[release] 1.21.3</text>
  
  <rect x="280" y="700" width="1400" height="50" rx="8" fill="#1a1a2e" stroke="transparent"/>
  <text x="310" y="730" fill="#8b8da3" font-family="Inter, sans-serif" font-size="13">[release] 1.20.6</text>
  
  <rect x="280" y="760" width="1400" height="50" rx="8" fill="#1a1a2e" stroke="transparent"/>
  <text x="310" y="790" fill="#8b8da3" font-family="Inter, sans-serif" font-size="13">[release] 1.8.9 — Classic PvP</text>
</svg>
