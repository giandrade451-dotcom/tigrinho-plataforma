<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="deskBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a12"/>
      <stop offset="50%" style="stop-color:#0f0d1a"/>
      <stop offset="100%" style="stop-color:#0a0a12"/>
    </linearGradient>
    <linearGradient id="barBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(10,10,18,0.92)"/>
      <stop offset="100%" style="stop-color:rgba(10,10,18,0.95)"/>
    </linearGradient>
  </defs>
  <!-- Wallpaper background -->
  <rect width="1920" height="1080" fill="url(#deskBg)"/>
  <!-- Grid -->
  <g opacity="0.03">
    <line x1="0" y1="270" x2="1920" y2="270" stroke="#bd93f9" stroke-width="1"/>
    <line x1="0" y1="540" x2="1920" y2="540" stroke="#bd93f9" stroke-width="1"/>
    <line x1="960" y1="0" x2="960" y2="1080" stroke="#bd93f9" stroke-width="1"/>
  </g>
  <!-- Center logo watermark -->
  <text x="960" y="520" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="900" fill="#ffffff" text-anchor="middle" opacity="0.04">PhantomArch</text>
  <!-- Desktop icons area -->
  <!-- FexNav icon -->
  <rect x="40" y="40" width="64" height="64" rx="14" fill="rgba(189,147,249,0.15)" stroke="rgba(189,147,249,0.3)" stroke-width="1"/>
  <text x="72" y="78" font-family="Arial" font-size="28" text-anchor="middle" fill="#bd93f9">🌐</text>
  <text x="72" y="118" font-family="Inter, Arial, sans-serif" font-size="11" fill="#cdd6f4" text-anchor="middle">FexNav</text>
  <!-- FexCode icon -->
  <rect x="40" y="150" width="64" height="64" rx="14" fill="rgba(0,255,247,0.1)" stroke="rgba(0,255,247,0.2)" stroke-width="1"/>
  <text x="72" y="188" font-family="Arial" font-size="28" text-anchor="middle" fill="#00fff7">💻</text>
  <text x="72" y="228" font-family="Inter, Arial, sans-serif" font-size="11" fill="#cdd6f4" text-anchor="middle">FexCode</text>
  <!-- FexAI icon -->
  <rect x="40" y="260" width="64" height="64" rx="14" fill="rgba(255,121,198,0.1)" stroke="rgba(255,121,198,0.2)" stroke-width="1"/>
  <text x="72" y="298" font-family="Arial" font-size="28" text-anchor="middle" fill="#ff79c6">🤖</text>
  <text x="72" y="338" font-family="Inter, Arial, sans-serif" font-size="11" fill="#cdd6f4" text-anchor="middle">FexAI</text>
  <!-- Terminal icon -->
  <rect x="40" y="370" width="64" height="64" rx="14" fill="rgba(80,250,123,0.1)" stroke="rgba(80,250,123,0.2)" stroke-width="1"/>
  <text x="72" y="408" font-family="Arial" font-size="28" text-anchor="middle" fill="#50fa7b">⌨</text>
  <text x="72" y="448" font-family="Inter, Arial, sans-serif" font-size="11" fill="#cdd6f4" text-anchor="middle">Terminal</text>
  <!-- Bottom taskbar -->
  <rect x="12" y="1032" width="1896" height="42" rx="16" fill="url(#barBg)" stroke="rgba(189,147,249,0.12)" stroke-width="1"/>
  <!-- Launcher button -->
  <rect x="24" y="1038" width="30" height="30" rx="8" fill="rgba(189,147,249,0.2)"/>
  <text x="39" y="1058" font-family="Arial" font-size="14" text-anchor="middle" fill="#bd93f9">⚡</text>
  <!-- Workspace dots -->
  <circle cx="80" cy="1053" r="4" fill="#bd93f9"/>
  <circle cx="94" cy="1053" r="4" fill="#6b6d80"/>
  <circle cx="108" cy="1053" r="4" fill="#6b6d80"/>
  <!-- Center taskbar icons -->
  <rect x="880" y="1040" width="26" height="26" rx="6" fill="rgba(189,147,249,0.15)"/>
  <rect x="912" y="1040" width="26" height="26" rx="6" fill="rgba(0,255,247,0.1)"/>
  <rect x="944" y="1040" width="26" height="26" rx="6" fill="rgba(255,121,198,0.1)"/>
  <rect x="976" y="1040" width="26" height="26" rx="6" fill="rgba(80,250,123,0.1)"/>
  <rect x="1008" y="1040" width="26" height="26" rx="6" fill="rgba(241,250,140,0.1)"/>
  <!-- Right side: system tray -->
  <text x="1750" y="1058" font-family="Inter, Arial, sans-serif" font-size="12" fill="#cdd6f4">📶 🔊 🔋 92%</text>
  <text x="1870" y="1058" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#ffffff" text-anchor="end">14:32</text>
  <!-- Power icon -->
  <text x="1900" y="1058" font-family="Arial" font-size="12" fill="#ff5555" text-anchor="end">⏻</text>
</svg>
