# ============================================================
# PhantomArch — Limits Configuration
# Otimizado para gaming e áudio em tempo real
# ============================================================

# Permitir real-time scheduling para áudio (PipeWire)
@audio          -       rtprio          99
@audio          -       memlock         unlimited
@audio          -       nice            -20

# Gamers — mais recursos
@games          -       nice            -10
@games          -       rtprio          50
@games          -       memlock         unlimited

# Todos os usuários — limites mais generosos
*               soft    nofile          1048576
*               hard    nofile          1048576
*               soft    nproc           unlimited
*               hard    nproc           unlimited
*               soft    memlock         unlimited
*               hard    memlock         unlimited
*               soft    stack           unlimited
*               hard    stack           unlimited

# Root
root            soft    nofile          1048576
root            hard    nofile          1048576
