# ============================================================
# PhantomArch — Kernel Performance Tuning
# Otimizado para gaming e baixa latência
# ============================================================

# --- Virtual Memory ---
# Aumentar vm.max_map_count para jogos (especialmente Proton/Wine)
vm.max_map_count = 2147483642

# Reduzir swappiness — manter mais coisas em RAM
vm.swappiness = 10

# Dirty pages — flush mais frequente para SSDs
vm.dirty_ratio = 10
vm.dirty_background_ratio = 5
vm.dirty_expire_centisecs = 3000
vm.dirty_writeback_centisecs = 1500

# VFS cache pressure — manter metadata em cache
vm.vfs_cache_pressure = 50

# Transparent Huge Pages — melhor para gaming
# (configurado via kernel cmdline também)
vm.compaction_proactiveness = 0

# Over-commit memory — permitir para jogos
vm.overcommit_memory = 1

# --- Rede ---
# TCP Fast Open
net.ipv4.tcp_fastopen = 3

# TCP BBR congestion control
net.core.default_qdisc = cake
net.ipv4.tcp_congestion_control = bbr

# Buffers de rede maiores
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216
net.core.rmem_default = 1048576
net.core.wmem_default = 1048576
net.core.optmem_max = 65536
net.ipv4.tcp_rmem = 4096 1048576 16777216
net.ipv4.tcp_wmem = 4096 65536 16777216

# Reduzir latência TCP
net.ipv4.tcp_low_latency = 1
net.ipv4.tcp_timestamps = 0
net.ipv4.tcp_sack = 1

# Connection tracking
net.netfilter.nf_conntrack_max = 131072

# --- Kernel ---
# Reduzir watchdog — menos overhead
kernel.nmi_watchdog = 0
kernel.watchdog = 0

# Split lock — não gerar warnings
kernel.split_lock_mitigate = 0

# Core dump
kernel.core_pattern = /tmp/core-%e-%p-%t

# Scheduler — performance
kernel.sched_autogroup_enabled = 1
kernel.sched_cfs_bandwidth_slice_us = 3000

# --- Filesystem ---
fs.inotify.max_user_watches = 524288
fs.inotify.max_user_instances = 1024
fs.file-max = 2097152

# --- Security (sem afetar performance) ---
kernel.kptr_restrict = 1
kernel.dmesg_restrict = 0
kernel.unprivileged_userns_clone = 1
