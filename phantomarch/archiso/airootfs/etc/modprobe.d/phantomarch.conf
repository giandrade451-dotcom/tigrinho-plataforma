# ============================================================
# PhantomArch — Modprobe Configuration
# Otimizações de módulos do kernel
# ============================================================

# --- NVIDIA ---
# Habilitar DRM kernel modesetting para Wayland
options nvidia_drm modeset=1 fbdev=1

# NVIDIA power management
options nvidia NVreg_PreserveVideoMemoryAllocations=1
options nvidia NVreg_UsePageAttributeTable=1
options nvidia NVreg_EnablePCIeGen3=1

# --- AMD ---
# Habilitar FreeSync/VRR
options amdgpu dc=1
options amdgpu dpm=1
options amdgpu gpu_recovery=1

# --- Intel ---
options i915 enable_guc=3
options i915 enable_fbc=1
options i915 fastboot=1

# --- USB ---
# Desabilitar autosuspend para periféricos gaming
options usbcore autosuspend=-1

# --- Áudio ---
# Intel HDA — melhor performance
options snd_hda_intel power_save=0
options snd_hda_intel power_save_controller=N

# --- Network ---
# Desabilitar power saving em Wi-Fi (reduz latência)
options iwlwifi power_save=0
options iwlmvm power_scheme=1

# --- Desabilitar módulos desnecessários ---
blacklist pcspkr
blacklist snd_pcsp
blacklist iTCO_wdt
blacklist sp5100_tco
blacklist nouveau
