# ╔══════════════════════════════════════════════════════════════╗
# ║  FexOS V5 — Hyprland Premium Additions                       ║
# ║  Visual polish, animations, blur, dock behavior              ║
# ╚══════════════════════════════════════════════════════════════╝

# === V5 Enhanced Animations ===
animations {
    enabled = true
    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = smoothIn, 0.25, 1, 0.5, 1
    bezier = overshot, 0.4, 0.8, 0.2, 1.2
    bezier = gentle, 0.5, 0, 0.2, 1
    bezier = premium, 0.22, 1, 0.36, 1

    animation = windows, 1, 5, premium, slide
    animation = windowsOut, 1, 4, smoothOut, slide
    animation = windowsMove, 1, 4, premium
    animation = border, 1, 10, default
    animation = borderangle, 1, 60, default, loop
    animation = fade, 1, 4, gentle
    animation = workspaces, 1, 5, overshot, slidevert
    animation = specialWorkspace, 1, 4, premium, slidefadevert 10%
}

# === V5 Enhanced Blur ===
decoration {
    rounding = 14
    active_opacity = 1.0
    inactive_opacity = 0.92
    fullscreen_opacity = 1.0

    blur {
        enabled = true
        size = 8
        passes = 3
        noise = 0.02
        contrast = 1.0
        brightness = 0.95
        vibrancy = 0.2
        vibrancy_darkness = 0.5
        new_optimizations = true
        xray = false
        ignore_opacity = true
    }

    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(0, 0, 0, 0.55)
        color_inactive = rgba(0, 0, 0, 0.3)
        offset = 0, 4
    }
}

# === V5 Binds ===
# PhantomUpdater
bind = SUPER, U, exec, kitty -e phantom-updater
# Security Center
bind = SUPER SHIFT, S, exec, kitty -e fex-security-center
# Quick settings panel
bind = SUPER, N, exec, swaync-client -t

# === V5 Window Rules ===
# PhantomUpdater floating
windowrulev2 = float, title:^(PhantomUpdater)$
windowrulev2 = size 600 500, title:^(PhantomUpdater)$
windowrulev2 = center, title:^(PhantomUpdater)$

# Security popups
windowrulev2 = float, title:^(Fex Security)$
windowrulev2 = size 420 300, title:^(Fex Security)$
windowrulev2 = center, title:^(Fex Security)$
windowrulev2 = pin, title:^(Fex Security)$

# Onboarding wizard
windowrulev2 = float, title:^(PhantomArch Onboarding)$
windowrulev2 = size 700 500, title:^(PhantomArch Onboarding)$
windowrulev2 = center, title:^(PhantomArch Onboarding)$

# === V5 Workspace rules ===
workspace = 1, default:true
workspace = 2, monitor:eDP-1
workspace = special:scratchpad, on-created-empty:kitty

# === V5 Misc ===
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    animate_manual_resizes = true
    animate_mouse_windowdragging = true
    enable_swallow = true
    swallow_regex = ^(kitty|Alacritty)$
}
