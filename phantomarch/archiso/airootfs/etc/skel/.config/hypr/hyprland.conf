# ╔══════════════════════════════════════════════════════════════╗
# ║  PhantomArch — Hyprland Configuration                       ║
# ║  "Ghost in the Machine" — Cyberpunk Neon Theme              ║
# ╚══════════════════════════════════════════════════════════════╝

# ┌──────────────────────────────────────────────────────────────┐
# │ Monitor Configuration                                         │
# └──────────────────────────────────────────────────────────────┘
# Detectar automaticamente — configure manualmente se necessário
monitor=,preferred,auto,1

# ┌──────────────────────────────────────────────────────────────┐
# │ Startup Applications                                          │
# └──────────────────────────────────────────────────────────────┘
exec-once = waybar
exec-once = hyprpaper
exec-once = dunst
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = hypridle
exec-once = nm-applet --indicator
exec-once = blueman-applet
exec-once = swww-daemon

# ┌──────────────────────────────────────────────────────────────┐
# │ Environment Variables                                         │
# └──────────────────────────────────────────────────────────────┘
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Catppuccin-Mocha-Dark-Cursors
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = GDK_BACKEND,wayland,x11
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = MOZ_ENABLE_WAYLAND,1
env = ELECTRON_OZONE_PLATFORM_HINT,auto

# NVIDIA (descomente se usar NVIDIA)
# env = LIBVA_DRIVER_NAME,nvidia
# env = __GLX_VENDOR_LIBRARY_NAME,nvidia
# env = NVD_BACKEND,direct
# env = GBM_BACKEND,nvidia-drm
# env = WLR_NO_HARDWARE_CURSORS,1

# ┌──────────────────────────────────────────────────────────────┐
# │ Input                                                         │
# └──────────────────────────────────────────────────────────────┘
input {
    kb_layout = br
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1
    mouse_refocus = false

    sensitivity = 0
    accel_profile = flat

    touchpad {
        natural_scroll = true
        tap-to-click = true
        drag_lock = true
        disable_while_typing = true
    }
}

# ┌──────────────────────────────────────────────────────────────┐
# │ General                                                       │
# └──────────────────────────────────────────────────────────────┘
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(bd93f9ff) rgba(00fff7ff) 45deg
    col.inactive_border = rgba(1a1a2eff)
    layout = dwindle
    allow_tearing = true
}

# ┌──────────────────────────────────────────────────────────────┐
# │ Decoration — Cyberpunk Neon                                   │
# └──────────────────────────────────────────────────────────────┘
decoration {
    rounding = 8

    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
        xray = true
        noise = 0.02
        contrast = 1.1
        brightness = 0.9
        vibrancy = 0.3
    }

    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(bd93f966)
        color_inactive = rgba(00000066)
    }
}

# ┌──────────────────────────────────────────────────────────────┐
# │ Animations — Smooth & Fast                                    │
# └──────────────────────────────────────────────────────────────┘
animations {
    enabled = true
    bezier = phantom, 0.05, 0.9, 0.1, 1.05
    bezier = phantomFast, 0.16, 1, 0.3, 1
    bezier = phantomSlow, 0.33, 0.67, 0.5, 1

    animation = windows, 1, 5, phantom
    animation = windowsOut, 1, 5, phantomFast, popin 80%
    animation = border, 1, 8, phantomSlow
    animation = borderangle, 1, 30, phantomSlow, loop
    animation = fade, 1, 4, phantomFast
    animation = workspaces, 1, 4, phantom, slide
    animation = specialWorkspace, 1, 4, phantomFast, slidevert
}

# ┌──────────────────────────────────────────────────────────────┐
# │ Layout                                                        │
# └──────────────────────────────────────────────────────────────┘
dwindle {
    pseudotile = true
    preserve_split = true
    force_split = 2
    smart_split = false
    smart_resizing = true
}

master {
    new_status = master
    orientation = left
}

# ┌──────────────────────────────────────────────────────────────┐
# │ Misc                                                          │
# └──────────────────────────────────────────────────────────────┘
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vrr = 1
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    animate_manual_resizes = true
    new_window_takes_over_fullscreen = 2
    enable_swallow = true
    swallow_regex = ^(kitty|alacritty)$
}

# ┌──────────────────────────────────────────────────────────────┐
# │ Window Rules                                                  │
# └──────────────────────────────────────────────────────────────┘
# Gaming
windowrulev2 = immediate, class:^(steam_app_.*)$
windowrulev2 = fullscreen, class:^(steam_app_.*)$
windowrulev2 = immediate, class:^(gamescope)$
windowrulev2 = fullscreen, class:^(gamescope)$

# Steam
windowrulev2 = stayfocused, title:^(Steam)$
windowrulev2 = float, title:^(Steam Settings)$
windowrulev2 = float, class:^(steam)$, title:^(Friends List)$

# Browsers
windowrulev2 = opacity 0.95 0.90, class:^(firefox)$
windowrulev2 = opacity 0.95 0.90, class:^(chromium)$

# Terminals
windowrulev2 = opacity 0.88 0.82, class:^(kitty)$
windowrulev2 = opacity 0.88 0.82, class:^(Alacritty)$

# Code Editors
windowrulev2 = opacity 0.92 0.88, class:^(code-oss)$
windowrulev2 = opacity 0.92 0.88, class:^(Code)$
windowrulev2 = opacity 0.92 0.88, class:^(codium)$

# File Manager
windowrulev2 = float, class:^(thunar)$, title:^(File Operation Progress)$
windowrulev2 = float, class:^(thunar)$, title:^(Confirm to replace files)$

# Picture-in-Picture
windowrulev2 = float, title:^(Picture-in-Picture)$
windowrulev2 = pin, title:^(Picture-in-Picture)$
windowrulev2 = size 400 225, title:^(Picture-in-Picture)$

# Dialogs
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = float, class:^(nwg-look)$
windowrulev2 = float, title:^(Open File)$
windowrulev2 = float, title:^(Save As)$

# ┌──────────────────────────────────────────────────────────────┐
# │ Keybindings                                                   │
# └──────────────────────────────────────────────────────────────┘
$mainMod = SUPER

# Core
bind = $mainMod, RETURN, exec, kitty
bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, Q, exit,
bind = $mainMod, E, exec, thunar
bind = $mainMod, V, togglefloating,
bind = $mainMod, SPACE, exec, wofi --show drun
bind = $mainMod, P, pseudo,
bind = $mainMod, J, togglesplit,
bind = $mainMod, F, fullscreen, 0
bind = $mainMod SHIFT, F, fullscreen, 1

# Apps
bind = $mainMod, B, exec, firefox
bind = $mainMod, C, exec, code
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | swappy -f -
bind = $mainMod, PRINT, exec, grim ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png

# Clipboard
bind = $mainMod SHIFT, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

# Move focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod SHIFT, J, movefocus, d

# Move windows
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u

# Resize
bind = $mainMod CTRL, left, resizeactive, -30 0
bind = $mainMod CTRL, right, resizeactive, 30 0
bind = $mainMod CTRL, up, resizeactive, 0 -30
bind = $mainMod CTRL, down, resizeactive, 0 30

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Mouse bindings
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Volume & Media
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous

# Brightness
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Lock
bind = $mainMod SHIFT, X, exec, hyprlock

# GameMode toggle
bind = $mainMod, G, exec, phantom-gamemode-toggle

# Power menu
bind = $mainMod SHIFT, E, exec, wlogout
