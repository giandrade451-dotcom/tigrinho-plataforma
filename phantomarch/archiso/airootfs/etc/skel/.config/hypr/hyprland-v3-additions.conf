# ╔══════════════════════════════════════════════════════════════╗
# ║  PhantomArch V3 — Hyprland Additions (Premium UX)            ║
# ║  Source este arquivo do hyprland.conf principal               ║
# ║  source = ~/.config/hypr/hyprland-v3-additions.conf          ║
# ╚══════════════════════════════════════════════════════════════╝

# === VISUAL PREMIUM ===
decoration {
    rounding = 12
    active_opacity = 0.98
    inactive_opacity = 0.92
    fullscreen_opacity = 1.0

    blur {
        enabled = true
        size = 8
        passes = 3
        noise = 0.02
        contrast = 1.1
        brightness = 1.0
        vibrancy = 0.2
        vibrancy_darkness = 0.5
        new_optimizations = true
        xray = false
    }

    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(0, 0, 0, 0.55)
        color_inactive = rgba(0, 0, 0, 0.3)
        offset = 0 4
    }
}

# === ANIMAÇÕES SUAVES ===
animations {
    enabled = true
    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = smoothIn, 0.25, 1, 0.5, 1
    bezier = overshot, 0.05, 0.9, 0.1, 1.05
    bezier = decel, 0.05, 0.7, 0.1, 1
    bezier = easeInOut, 0.42, 0, 0.58, 1

    animation = windows, 1, 4, overshot, slide
    animation = windowsIn, 1, 4, overshot, slide
    animation = windowsOut, 1, 4, smoothOut, slide
    animation = windowsMove, 1, 4, decel, slide
    animation = border, 1, 8, decel
    animation = borderangle, 1, 40, decel, loop
    animation = fade, 1, 4, smoothIn
    animation = fadeDim, 1, 4, smoothIn
    animation = workspaces, 1, 5, overshot, slidevert
    animation = specialWorkspace, 1, 4, overshot, slidevert
    animation = layers, 1, 3, easeInOut, fade
}

# === LAYOUTS ===
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(bd93f9ee) rgba(00fff7ee) 45deg
    col.inactive_border = rgba(1a1a2e88)
    layout = dwindle
    resize_on_border = true
}

dwindle {
    pseudotile = true
    preserve_split = true
    smart_split = true
    smart_resizing = true
}

# === GESTURES ===
gestures {
    workspace_swipe = true
    workspace_swipe_fingers = 3
    workspace_swipe_distance = 300
    workspace_swipe_invert = true
    workspace_swipe_cancel_ratio = 0.5
    workspace_swipe_create_new = true
}

# === MISC ===
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    animate_manual_resizes = true
    animate_mouse_windowdragging = true
    vrr = 1
    enable_swallow = true
    swallow_regex = ^(kitty)$
    focus_on_activate = true
    new_window_takes_over_fullscreen = 2
}

# === V3 KEYBINDS ===
$mainMod = SUPER

# Apps
bind = $mainMod, W, exec, fexnav
bind = $mainMod, E, exec, dolphin
bind = $mainMod, C, exec, fexcode
bind = $mainMod, A, exec, fexai
bind = $mainMod SHIFT, S, exec, grimblast --notify copy area
bind = $mainMod, P, exec, wlogout
bind = $mainMod SHIFT, P, exec, hyprpicker -a
bind = $mainMod, N, exec, swaync-client -t -sw

# Performance modes
bind = $mainMod, G, exec, gamemoded -d && notify-send "Game Mode ON" || gamemoded -r && notify-send "Game Mode OFF"
bind = $mainMod SHIFT, T, exec, notify-send "Turbo Mode" && sudo cpupower frequency-set -g performance

# Quick settings
bind = $mainMod, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

# Window management (enhanced)
bind = $mainMod, Tab, cyclenext
bind = $mainMod SHIFT, Tab, cyclenext, prev
bind = $mainMod, grave, togglespecialworkspace, magic
bind = $mainMod SHIFT, grave, movetoworkspace, special:magic

# Resize submap
bind = $mainMod, R, submap, resize
submap = resize
binde = , right, resizeactive, 20 0
binde = , left, resizeactive, -20 0
binde = , up, resizeactive, 0 -20
binde = , down, resizeactive, 0 20
bind = , escape, submap, reset
submap = reset

# === WINDOW RULES (Premium) ===
windowrulev2 = opacity 0.90, class:^(kitty)$
windowrulev2 = opacity 0.95, class:^(code)$
windowrulev2 = opacity 0.95, class:^(FexCode)$
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = float, title:^(Picture-in-Picture)$
windowrulev2 = pin, title:^(Picture-in-Picture)$
windowrulev2 = size 480 270, title:^(Picture-in-Picture)$
windowrulev2 = float, class:^(org.kde.polkit-kde-authentication-agent-1)$
windowrulev2 = float, class:^(xdg-desktop-portal-gtk)$

# Gaming rules
windowrulev2 = fullscreen, class:^(steam_app_.*)$
windowrulev2 = immediate, class:^(steam_app_.*)$
windowrulev2 = noblur, class:^(steam_app_.*)$
windowrulev2 = noshadow, class:^(steam_app_.*)$
windowrulev2 = fullscreen, class:^(gamescope)$
windowrulev2 = immediate, class:^(gamescope)$

# FexNav
windowrulev2 = opacity 0.98, class:^(fexnav)$
windowrulev2 = opacity 0.98, class:^(wine)$,title:^(FexNav)$

# === STARTUP APPS ===
exec-once = waybar
exec-once = hyprpaper
exec-once = swaync
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
