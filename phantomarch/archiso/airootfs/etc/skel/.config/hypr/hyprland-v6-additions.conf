# ╔══════════════════════════════════════════════════════════════╗
# ║  FexOS V6 — Hyprland Performance + No-Lag Interface          ║
# ║  Zero lag, smooth, premium feel without stuttering           ║
# ╚══════════════════════════════════════════════════════════════╝

# V6 source (add after V5)
# source = ~/.config/hypr/hyprland-v6-additions.conf

# ═══════════════════════════════════════════
# PERFORMANCE (ZERO LAG)
# ═══════════════════════════════════════════
misc {
    vfr = true
    vrr = 1
    no_direct_scanout = false
    animate_manual_resizes = false
    animate_mouse_windowdragging = false
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    new_window_takes_over_fullscreen = 2
}

# Render optimization — prevents lag
render {
    explicit_sync = 2
    explicit_sync_kms = 1
    direct_scanout = true
}

# ═══════════════════════════════════════════
# ANIMATIONS (FAST + SMOOTH — NOT HEAVY)
# ═══════════════════════════════════════════
animations {
    enabled = true
    first_launch_animation = false

    bezier = fastOut, 0.16, 1, 0.3, 1
    bezier = snappy, 0.4, 0, 0.2, 1
    bezier = instant, 0, 0, 0, 1

    animation = windows, 1, 3, fastOut, popin 85%
    animation = windowsOut, 1, 2, snappy, popin 80%
    animation = windowsMove, 1, 2, snappy
    animation = fade, 1, 2, fastOut
    animation = fadeOut, 1, 1, instant
    animation = workspaces, 1, 3, fastOut, slide
    animation = specialWorkspace, 1, 3, snappy, slidevert
}

# ═══════════════════════════════════════════
# DECORATIONS (PREMIUM BUT LIGHTWEIGHT)
# ═══════════════════════════════════════════
decoration {
    rounding = 10
    active_opacity = 1.0
    inactive_opacity = 0.92
    fullscreen_opacity = 1.0

    blur {
        enabled = true
        size = 6
        passes = 2
        new_optimizations = true
        xray = false
        noise = 0.01
        contrast = 1.0
        brightness = 0.95
        vibrancy = 0.15
        special = true
        popups = true
    }

    shadow {
        enabled = true
        range = 12
        render_power = 3
        color = rgba(0a0a1299)
        color_inactive = rgba(0a0a1266)
    }
}

# ═══════════════════════════════════════════
# KEYBINDS — V6 APPS
# ═══════════════════════════════════════════
# FexLauncher
bind = SUPER, G, exec, fexlauncher --gui
# FexNav browser
bind = SUPER, W, exec, fexnav
# FexStore
bind = SUPER, S, exec, fexstore --gui
# Task Manager
bind = CTRL SHIFT, Escape, exec, kitty -e fex-taskmanager
# GameFPS toggle
bind = SUPER, F12, exec, gamefps-mode toggle
# Screenshot
bind = , Print, exec, grimblast copy area
bind = SHIFT, Print, exec, grimblast copy screen

# ═══════════════════════════════════════════
# WINDOW RULES — V6 APPS
# ═══════════════════════════════════════════
windowrulev2 = float, class:^(FexLauncher)$
windowrulev2 = size 1100 700, class:^(FexLauncher)$
windowrulev2 = center, class:^(FexLauncher)$

windowrulev2 = float, class:^(FexStore)$
windowrulev2 = size 1200 800, class:^(FexStore)$
windowrulev2 = center, class:^(FexStore)$

# Games get fullscreen priority
windowrulev2 = fullscreen, class:^(steam_app_.*)$
windowrulev2 = immediate, class:^(steam_app_.*)$
windowrulev2 = fullscreen, title:^(Minecraft).*$
windowrulev2 = immediate, title:^(Minecraft).*$

# No idle when gaming
windowrulev2 = idleinhibit always, class:^(steam_app_.*)$
windowrulev2 = idleinhibit always, title:^(Minecraft).*$
