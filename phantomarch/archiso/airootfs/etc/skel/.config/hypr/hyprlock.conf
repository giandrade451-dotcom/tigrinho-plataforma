# PhantomArch — Hyprlock Configuration
# Lockscreen cyberpunk neon

general {
    disable_loading_bar = false
    hide_cursor = true
    grace = 3
    no_fade_in = false
}

background {
    monitor =
    path = /usr/share/phantom/wallpapers/phantom-lock.png
    blur_passes = 3
    blur_size = 6
    noise = 0.02
    contrast = 1.1
    brightness = 0.6
    vibrancy = 0.3
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    dots_rounding = -1
    outer_color = rgba(189, 147, 249, 0.8)
    inner_color = rgba(10, 10, 18, 0.9)
    font_color = rgb(248, 248, 242)
    fade_on_empty = true
    fade_timeout = 2000
    placeholder_text = <i>Ghost Password...</i>
    hide_input = false
    rounding = 12
    check_color = rgb(0, 255, 247)
    fail_color = rgb(255, 85, 85)
    fail_text = <i>Access Denied</i>
    capslock_color = rgb(255, 184, 108)
    position = 0, -100
    halign = center
    valign = center
}

label {
    monitor =
    text = 👻 PhantomArch
    color = rgba(189, 147, 249, 0.9)
    font_size = 32
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"
    color = rgba(0, 255, 247, 0.9)
    font_size = 72
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 200
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y"
    color = rgba(248, 248, 242, 0.7)
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = 0, 140
    halign = center
    valign = center
}
