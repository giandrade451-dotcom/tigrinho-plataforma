# PhantomArch V3 — Hyprlock Premium Lock Screen

general {
    grace = 3
    hide_cursor = true
    no_fade_in = false
}

background {
    monitor =
    path = screenshot
    blur_passes = 4
    blur_size = 6
    noise = 0.02
    contrast = 0.9
    brightness = 0.6
    vibrancy = 0.2
    vibrancy_darkness = 0.0
}

# Clock
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(248, 248, 242, 1.0)
    font_size = 72
    font_family = Inter
    position = 0, 180
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %d de %B %Y')"
    color = rgba(139, 141, 163, 1.0)
    font_size = 16
    font_family = Inter
    position = 0, 110
    halign = center
    valign = center
}

# User greeting
label {
    monitor =
    text = Bem-vindo, $USER
    color = rgba(189, 147, 249, 1.0)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, -30
    halign = center
    valign = center
}

# Password input
input-field {
    monitor =
    size = 280, 48
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    outer_color = rgba(189, 147, 249, 0.6)
    inner_color = rgba(26, 26, 46, 0.9)
    font_color = rgba(248, 248, 242, 1.0)
    fade_on_empty = false
    placeholder_text = <span foreground="##8b8da3">Senha...</span>
    hide_input = false
    position = 0, -80
    halign = center
    valign = center
    rounding = 12
    check_color = rgba(80, 250, 123, 0.8)
    fail_color = rgba(255, 85, 85, 0.8)
    fail_text = <span foreground="##ff5555">Senha incorreta</span>
    capslock_color = rgba(255, 184, 108, 0.8)
}

# PhantomArch branding
label {
    monitor =
    text = ⚡ PhantomArch V3
    color = rgba(189, 147, 249, 0.6)
    font_size = 11
    font_family = JetBrainsMono Nerd Font
    position = 0, -160
    halign = center
    valign = center
}
