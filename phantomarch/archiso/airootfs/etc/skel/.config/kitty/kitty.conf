# ╔══════════════════════════════════════════════════════════════╗
# ║  PhantomArch — Kitty Terminal Configuration                  ║
# ║  Cyberpunk Neon Dark Theme                                   ║
# ╚══════════════════════════════════════════════════════════════╝

# --- Font ---
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# --- Cursor ---
cursor_shape          beam
cursor_beam_thickness 2
cursor_blink_interval 0.5
cursor                #00fff7
cursor_text_color     #0a0a12

# --- Scrollback ---
scrollback_lines 10000

# --- Mouse ---
url_color #bd93f9
url_style curly
open_url_with default
detect_urls yes
copy_on_select clipboard

# --- Performance ---
repaint_delay    6
input_delay      1
sync_to_monitor  yes

# --- Window ---
window_padding_width  8 12
background_opacity    0.88
dynamic_background_opacity yes
confirm_os_window_close 0
hide_window_decorations yes
window_margin_width   0

# --- Tab bar ---
tab_bar_style       powerline
tab_powerline_style slanted
tab_bar_edge        bottom
active_tab_foreground   #0a0a12
active_tab_background   #bd93f9
inactive_tab_foreground #8b8da3
inactive_tab_background #1a1a2e

# --- Bell ---
enable_audio_bell no
visual_bell_duration 0.0

# ┌──────────────────────────────────────────────────────────────┐
# │ Color Scheme — Phantom Cyberpunk                              │
# └──────────────────────────────────────────────────────────────┘

# Background & Foreground
foreground #f8f8f2
background #0a0a12

# Selection
selection_foreground #0a0a12
selection_background #bd93f9

# Black
color0  #1a1a2e
color8  #3d3d5c

# Red
color1  #ff5555
color9  #ff6e6e

# Green
color2  #50fa7b
color10 #69ff94

# Yellow
color3  #f1fa8c
color11 #ffffa5

# Blue
color4  #6272a4
color12 #8be9fd

# Magenta
color5  #ff79c6
color13 #ff92df

# Cyan
color6  #00fff7
color14 #33fff9

# White
color7  #f8f8f2
color15 #ffffff

# --- Shell ---
shell zsh
