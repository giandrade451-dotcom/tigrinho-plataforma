# PhantomArch 1.0 — pacman.conf otimizado
# Performance máxima com downloads paralelos e cache inteligente

[options]
HoldPkg     = pacman glibc
Architecture = x86_64
Color
CheckSpace
VerbosePkgLists
ParallelDownloads = 10
SigLevel    = Required DatabaseOptional
LocalFileSigLevel = Optional

# ============================================================
# Repositórios Oficiais Arch
# ============================================================

[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

[multilib]
Include = /etc/pacman.d/mirrorlist

# ============================================================
# Repositórios Adicionais — PhantomArch
# ============================================================

# Chaotic-AUR — pacotes AUR pré-compilados
[chaotic-aur]
Include = /etc/pacman.d/chaotic-mirrorlist

# ============================================================
# Opções de Compilação (makepkg)
# ============================================================
# CFLAGS otimizadas ficam em /etc/makepkg.conf
